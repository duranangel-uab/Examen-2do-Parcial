{% extends "appbuilder/base.html" %}

{% block content %}
<div class="container">
    <h2>🏅 Top 5 platos más vendidos</h2>
    
    {% if platos %}
    <canvas id="topPlatosChart" width="400" height="200"></canvas>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const ctx = document.getElementById('topPlatosChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: {{ platos|tojson }},
                datasets: [{
                    label: 'Cantidad vendida',
                    data: {{ cantidades|tojson }},
                    backgroundColor: [
                        '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF'
                    ]
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
    {% else %}
    <div class="alert alert-warning">No hay datos de ventas.</div>
    {% endif %}
</div>
{% endblock %}
