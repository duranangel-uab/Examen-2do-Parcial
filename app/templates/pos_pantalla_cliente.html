<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Su pedido - El Deseo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1f1810; color: #f3e9dd; font-family: 'Poppins', sans-serif; margin: 0; }
        .header { text-align: center; padding: 24px 0; }
        .header h1 { font-size: 2rem; }

        .slideshow-wrap {
            position: relative; width: 100%; height: 55vh; overflow: hidden;
            border-bottom: 3px solid #3a2a1f;
        }
        .slideshow-wrap img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0; transition: opacity 1.2s ease-in-out;
        }
        .slideshow-wrap img.activa { opacity: 1; }
        .slideshow-wrap .overlay-texto {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,.75));
            padding: 40px 20px 16px; text-align: center; font-size: 1.4rem;
        }
        .slideshow-vacio {
            display: flex; align-items: center; justify-content: center;
            height: 55vh; font-size: 1.5rem; color: #6b5a4a;
        }

        .item-card {
            background: #2c2118; border-radius: 14px; padding: 14px;
            display: flex; align-items: center; gap: 16px; margin-bottom: 14px;
        }
        .item-card .imagen-wrap {
            width: 80px; height: 80px; border-radius: 10px; overflow: hidden;
            background: #3a2a1f; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
        }
        .item-card .imagen-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .item-card .imagen-wrap .sin-imagen { font-size: 2rem; color: #6b5a4a; }
        .item-card .info { flex: 1; }
        .item-card .nombre { font-size: 1.2rem; font-weight: 600; }
        .item-card .detalle { color: #c8b8a5; }
        .item-card .subtotal { font-size: 1.2rem; font-weight: 600; color: #d4a373; }
        .total-box {
            text-align: center; margin-top: 24px; padding: 20px;
            border-top: 2px solid #3a2a1f;
        }
        .total-box .monto { font-size: 2.4rem; font-weight: 700; color: #d4a373; }
        .vacio { text-align: center; color: #6b5a4a; margin-top: 30px; font-size: 1.3rem; }
    </style>
</head>
<body>
    <div class="slideshow-wrap" id="slideshowWrap">
        <div class="slideshow-vacio" id="slideshowVacio">🍽️ Restaurante El Deseo</div>
        <div class="overlay-texto" id="slideshowTexto" style="display:none;">🍽️ Restaurante El Deseo &mdash; Sabores que enamoran</div>
    </div>

    <div class="header" id="headerPedido" style="display:none;">
        <h1>🍽️ Restaurante El Deseo</h1>
        <p class="text-muted">Su pedido en este momento</p>
    </div>

    <div class="container" id="contenido" style="max-width: 700px; display:none;"></div>

    <div class="container total-box" id="totalBox" style="max-width: 700px; display:none;">
        <div>Total</div>
        <div class="monto" id="totalMonto">Bs 0.00</div>
    </div>

    <script>
        const imagenesSlideshow = {{ imagenes_slideshow | tojson }};
        let indiceSlide = 0;
        let slideshowActivo = true;

        function construirSlideshow() {
            const wrap = document.getElementById('slideshowWrap');
            const vacio = document.getElementById('slideshowVacio');
            const texto = document.getElementById('slideshowTexto');

            if (!imagenesSlideshow || imagenesSlideshow.length === 0) {
                return; // se queda el mensaje de "vacio" tal como esta
            }

            vacio.style.display = 'none';
            texto.style.display = 'block';

            imagenesSlideshow.forEach(function (src, i) {
                const img = document.createElement('img');
                img.src = src;
                if (i === 0) img.classList.add('activa');
                wrap.insertBefore(img, texto);
            });

            setInterval(function () {
                if (!slideshowActivo) return;
                const imgs = wrap.querySelectorAll('img');
                if (imgs.length < 2) return;
                imgs[indiceSlide].classList.remove('activa');
                indiceSlide = (indiceSlide + 1) % imgs.length;
                imgs[indiceSlide].classList.add('activa');
            }, 4000);
        }

        async function actualizar() {
            try {
                const resp = await fetch('/pos/carrito-vivo');
                const data = await resp.json();
                if (!data.ok) return;

                const items = data.carrito.items || [];
                const total = data.carrito.total || 0;

                const slideshowWrap = document.getElementById('slideshowWrap');
                const headerPedido = document.getElementById('headerPedido');
                const contenido = document.getElementById('contenido');
                const totalBox = document.getElementById('totalBox');

                if (items.length === 0) {
                    // Sin pedido activo: mostrar el slideshow a pantalla completa
                    slideshowActivo = true;
                    slideshowWrap.style.height = '100vh';
                    headerPedido.style.display = 'none';
                    contenido.style.display = 'none';
                    totalBox.style.display = 'none';
                    return;
                }

                // Hay un pedido en construcción: encoger el slideshow y mostrar el detalle
                slideshowActivo = true;
                slideshowWrap.style.height = '30vh';
                headerPedido.style.display = 'block';
                contenido.style.display = 'block';
                totalBox.style.display = 'block';

                let html = '';
                items.forEach(function (item) {
                    const subtotal = item.precio * item.cantidad;
                    const imagenHtml = item.imagen
                        ? `<img src="${item.imagen}" alt="${item.nombre}">`
                        : '<span class="sin-imagen">🍽️</span>';
                    html += `
                        <div class="item-card">
                            <div class="imagen-wrap">${imagenHtml}</div>
                            <div class="info">
                                <div class="nombre">${item.nombre}</div>
                                <div class="detalle">Bs ${item.precio.toFixed(2)} &times; ${item.cantidad}</div>
                            </div>
                            <div class="subtotal">Bs ${subtotal.toFixed(2)}</div>
                        </div>`;
                });
                contenido.innerHTML = html;
                document.getElementById('totalMonto').textContent = 'Bs ' + total.toFixed(2);
            } catch (e) {
                // Si falla la conexión momentáneamente, simplemente se reintenta
                // en el próximo ciclo sin interrumpir la pantalla.
            }
        }

        construirSlideshow();
        actualizar();
        setInterval(actualizar, 2000);
    </script>
</body>
</html>
