<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante El Deseo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=1200'); background-size: cover; background-position: center; color: white; padding: 100px 0; text-align: center; }
        .hero h1 { font-size: 4rem; font-weight: bold; }
        .hero p { font-size: 1.5rem; }
        .btn-reserva { background-color: #d4a373; border: none; color: white; padding: 12px 30px; font-size: 1.2rem; border-radius: 30px; }
        .btn-reserva:hover { background-color: #b8895e; color: white; }
        .btn-login { background-color: #6c757d; border: none; color: white; padding: 12px 30px; font-size: 1.2rem; border-radius: 30px; text-decoration: none; margin-left: 10px; }
        .btn-login:hover { background-color: #5a6268; color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🍽️ El Deseo</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="/menu">Menú</a></li>
                    <li class="nav-item"><a class="nav-link" href="/contacto">Contacto</a></li>
                    <li class="nav-item"><a class="nav-link" href="/login">Ingresar</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="hero">
        <div class="container">
            <h1>🍽️ Restaurante El Deseo</h1>
            <p class="lead">Sabores que enamoran, en el corazón de Cochabamba</p>
            <a href="/menu" class="btn btn-reserva">Ver Menú</a>
            <a href="/login" class="btn btn-login">Ingresar</a>
        </div>
    </div>

    <section class="py-5">
        <div class="container text-center">
            <h2>📍 Ubicación</h2>
            <p><strong>Av. Kilometro 7 esquina Fortin Alihuata, Cochabamba</strong></p>
            <div class="mt-3">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3787.425962511228!2d-66.1653920842251!3d-17.34308740450713!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x93e3740a96a51e09%3A0x6b36c1ed7c54755c!2sCochabamba%2C%20Bolivia!5e0!3m2!1ses!2s!4v1620000000000" width="100%" height="300" style="border:0; max-width:600px;" allowfullscreen></iframe>
            </div>
        </div>
    </section>

    <footer class="bg-dark text-white text-center py-3">
        <p class="mb-0">© 2026 Restaurante El Deseo - Todos los derechos reservados</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
